{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Project Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
<div class="card p-4 shadow">

<h4 class="text-center mb-4">📄 Project Feedback</h4>

<form method="POST" id="feedbackForm">
    {% csrf_token %}
    <h6>Evaluator Details</h6>
    <input name="name" class="form-control mb-2" placeholder="Name" required>
    <input name="id" class="form-control mb-2" placeholder="Employee Id" required>
    <input name="designation" class="form-control mb-3" placeholder="Designation">
    <label class="fw-semibold">Select Batch</label>
    <select id="batchSelect" name="batch_id" class="form-select mb-3" required>
        <option value="">-- Select Batch --</option>
        {% for batch in batches %}
            <option value="{{ batch.id }}">{{ batch.number }}</option>
        {% endfor %}
    </select>
    <input type="hidden" name="project_id" id="projectId">
    <div id="paperContainer" class="mb-4 d-none">
        <iframe id="paperFrame"
                style="width:100%; height:400px; border-radius:10px;">
        </iframe>
    </div>
    <div id="ratingSection" class="row g-3 d-none">
        <div class="col-md-6">
            <input name="innovation" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Innovation" required>
        </div>
        <div class="col-md-6">
            <input name="mixed" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Mixed Methods" required>
        </div>
        <div class="col-md-6">
            <input name="society_impact" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Society Impact" required>
        </div>
        <div class="col-md-6">
            <input name="feasibility" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Feasibility" required>
        </div>
        <div class="col-md-6">
            <input name="outcome_harvesting" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Outcome Harvesting" required>
        </div>
        <div class="col-md-6">
            <input name="paper_based_selection" type="number" min="1" max="10" step="1"
                   class="form-control" placeholder="Paper Selection" required>
        </div>
        <div class="col-md-6">
            <input name="sustainability" type="number" min="0" max="10" step="1"
                   class="form-control" placeholder="Sustainability">
        </div>
    </div>
    <button id="submitBtn" class="btn btn-primary mt-4 d-none">
        Submit Feedback
    </button>
</form>
</div>
</div>
<script>
document.getElementById("batchSelect").addEventListener("change", function () {
    const batchId = this.value;
    document.getElementById("paperContainer").classList.add("d-none");
    document.getElementById("ratingSection").classList.add("d-none");
    document.getElementById("submitBtn").classList.add("d-none");
    document.getElementById("paperFrame").src = "";
    document.getElementById("projectId").value = "";
    if (!batchId) return;
    fetch(`/projects/feedback/get_feedback/?batch_id=${batchId}`)
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                document.getElementById("paperFrame").src = data.paper_url;
                document.getElementById("paperContainer").classList.remove("d-none");
                document.getElementById("ratingSection").classList.remove("d-none");
                document.getElementById("submitBtn").classList.remove("d-none");
                document.getElementById("feedbackForm").action =
                    `/projects/feedback/submit/${data.project_id}/`;
                document.getElementById("projectId").value = data.project_id;
            }
            else
            {
alert("Please Ensure project paper for the selected batch is Uploaded before submitting feedback.");
            }
        });
});
</script>
</body>
</html>
