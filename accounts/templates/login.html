<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    .left-section{
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        color: white;
    }
    @media (max-width: 768px) {
        .left-section {
            height: 50vh;
            text-align: center;
            padding: 20px;
        }
    }
</style>
</head>

<body>

<div class="container-fluid">
    <div class="row">
        
        <!-- Left Section -->
        <div class="col-md-6 left-section d-flex flex-column justify-content-center align-items-center">
            <h1 class="display-4">Welcome to Project Portal</h1>
            <p class="lead">Manage your projects efficiently and effectively.</p>
        </div>

        <!-- Right Section -->
        <div class="col-md-6 d-flex flex-column justify-content-center align-items-center">
            
            <h2 class="mb-4">Login to Your Account</h2>

            <form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3 text-end">
        <a href="{% url 'password_reset' %}" class="text-decoration-none">
            Forgot password?
        </a>
    </div>

    <button type="submit" class="btn btn-primary w-100">
        Login
    </button>
</form>

{% if error %}
<p class="text-danger">{{ error }}</p>
{% endif %}

        </div>

    </div>
</div>

</body>
</html>
